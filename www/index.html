<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>IELTS 7.5 · 8-Week Sprint</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 顶部状态条 -->
  <header id="topbar">
    <div class="topbar-inner">
      <div class="tb-left">
        <span class="tb-logo" aria-hidden="true">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="tbm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#0d9488"/></linearGradient></defs>
            <rect x="6" y="6" width="88" height="88" rx="26" fill="url(#tbm)"/>
            <circle cx="46" cy="54" r="22" fill="none" stroke="#fff" stroke-opacity=".5" stroke-width="5"/>
            <circle cx="46" cy="54" r="12.5" fill="none" stroke="#fff" stroke-opacity=".9" stroke-width="5"/>
            <circle cx="46" cy="54" r="4.5" fill="#fff"/>
            <path d="M82 22 L49 55" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
            <path d="M82 22 l-13 2 M82 22 l-2 13" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
          </svg>
        </span>
        <div id="tb-title">Today</div>
      </div>
      <div id="tb-streak" class="streak">🔥 <span id="streak-num">0</span></div>
    </div>
  </header>

  <!-- 主内容容器,各页面渲染到这里 -->
  <main id="view"></main>

  <!-- 底部导航 -->
  <nav id="tabbar">
    <button class="tab active" data-tab="today">
      <span class="tab-ic">📅</span><span class="tab-tx">Today</span>
    </button>
    <button class="tab" data-tab="vocab">
      <span class="tab-ic">🗂️</span><span class="tab-tx">Words</span>
    </button>
    <button class="tab" data-tab="practice">
      <span class="tab-ic">📚</span><span class="tab-tx">Practice</span>
    </button>
    <button class="tab" data-tab="me">
      <span class="tab-ic">📈</span><span class="tab-tx">Profile</span>
    </button>
  </nav>

  <!-- 数据(纯JS全局对象,WebView离线最稳) -->
  <script>window.IELTS_DATA = {};</script>
  <script src="data/vocab.js"></script>
  <script src="data/vocab_b2.js"></script>
  <script src="data/vocab_b3.js"></script>
  <script src="data/vocab_b4.js"></script>
  <script src="data/vocab_b5.js"></script>
  <script src="data/vocab_b6.js"></script>
  <script src="data/vocab_b7.js"></script>
  <script src="data/vocab_b8.js"></script>
  <script src="data/reading.js"></script>
  <script src="data/reading_b2.js"></script>
  <script src="data/reading_b3.js"></script>
  <script src="data/reading_b4.js"></script>
  <script src="data/reading_bx.js"></script>
  <script src="data/reading_by.js"></script>
  <script src="data/listening.js"></script>
  <script src="data/listening_b2.js"></script>
  <script src="data/listening_b3.js"></script>
  <script src="data/listening_b4.js"></script>
  <script src="data/listening_b5.js"></script>
  <script src="data/listening_b6.js"></script>
  <script src="data/listening_b7.js"></script>
  <script src="data/listening_bx.js"></script>
  <script src="data/listening_by.js"></script>
  <script src="data/writing.js"></script>
  <script src="data/writing_b2.js"></script>
  <script src="data/writing_b3.js"></script>
  <script src="data/writing_b4.js"></script>
  <script src="data/speaking.js"></script>
  <script src="data/speaking_b2.js"></script>
  <script src="data/speaking_b3.js"></script>
  <script src="data/speaking_b4.js"></script>
  <script src="data/exam_bank.js"></script>
  <script src="data/plan.js"></script>
  <script src="data/audio_index.js"></script>

  <!-- 引擎 -->
  <script src="js/storage.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-sync.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/audioplayer.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/quiz.js"></script>

  <!-- 页面模块 -->
  <script src="js/modules/cover.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/vocab.js"></script>
  <script src="js/modules/reading.js"></script>
  <script src="js/modules/listening.js"></script>
  <script src="js/modules/writing.js"></script>
  <script src="js/modules/speaking.js"></script>
  <script src="js/modules/practice.js"></script>
  <script src="js/modules/me.js"></script>

  <!-- 主控 -->
  <script src="js/app.js"></script>
</body>
</html>
